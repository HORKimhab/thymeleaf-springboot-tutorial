<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Thymeleaf Message Expression</title>
</head>

<body>
    <h1>Message expression demo:</h1>
    <mark>--message expression--</mark>
    <h2 th:text="#{app.name}"></h2>
    <h2 th:text="#{welcome.message('HKimhab')}"></h2>
</body>

</html>
