<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Home page - thymeleaf springboot tutorial</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        th:attr="data-fallback=@{/bootstrap/css/bootstrap.min.css}"
        onerror="this.onerror=null;this.href=this.dataset.fallback;" />
</head>

<body class="bg-body-tertiary">
    <div class="container py-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h3 mb-4">Thymeleaf springboot tutorial</h1>
                <div class="list-group">
                    <a class="list-group-item list-group-item-action" th:href="@{/user-variable-expression}">Variable
                        expression</a>
                    <a class="list-group-item list-group-item-action" th:href="@{/user-selection-expression}">Selection
                        expression</a>
                    <a class="list-group-item list-group-item-action" th:href="@{/link-expression}">Link expression</a>
                    <a class="list-group-item list-group-item-action"
                        th:href="@{/fragment-expression}">fragment-expression</a>
                    <a class="list-group-item list-group-item-action" th:href="@{/users}"
                        title="looping or iteration">Loop expression</a>
                    <a class="list-group-item list-group-item-action" th:href="@{/switch-statement}"
                        title="Switch statement">Switch statement</a>
                    <a class="list-group-item list-group-item-action" th:href="@{/register}"
                        title="Click to register">Register account</a>
                </div>
            </div>
        </div>
    </div>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        th:attr="data-fallback=@{/bootstrap/js/bootstrap.bundle.min.js}"
        onerror="this.onerror=null;this.src=this.dataset.fallback;"></script>
</body>

</html>
